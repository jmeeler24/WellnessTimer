name: CI & Release

# CodeQL runs on every push to main, PR, and weekly schedule. On v* tags it
# also gates the Windows build that produces and uploads WellnessTimer.exe.
# Tag a release:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '29 9 * * 1'   # weekly, Mon ~09:29 UTC

permissions:
  contents: write          # softprops/action-gh-release needs this to publish
  security-events: write   # CodeQL needs this to upload findings

jobs:
  codeql:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  build-release:
    name: Build & publish exe
    needs: codeql
    # Only build the release artifact on v* tag pushes; for plain pushes,
    # PRs, and the weekly schedule we just need CodeQL to run.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    defaults:
      run:
        working-directory: wellness_timer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: wellness_timer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller build.spec --clean --noconfirm

      - name: Smoke-check the build artifact exists
        shell: pwsh
        run: |
          if (-not (Test-Path dist\WellnessTimer.exe)) {
            throw "WellnessTimer.exe was not produced"
          }
          $size = (Get-Item dist\WellnessTimer.exe).Length / 1MB
          Write-Host ("Built dist\WellnessTimer.exe ({0:N1} MB)" -f $size)

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: wellness_timer/dist/WellnessTimer.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
